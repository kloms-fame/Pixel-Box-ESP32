<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>Pixel-Box 核心终端</title>
  <style>
    :root {
      --bg: #09090b;
      --panel: #18181b;
      --accent: #0ea5e9;
      --danger: #ef4444;
      --text: #a1a1aa;
      --border: #27272a;
    }

    body {
      font-family: 'JetBrains Mono', Consolas, monospace;
      max-width: 520px;
      margin: 30px auto;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
    }

    .terminal-card {
      background: var(--panel);
      padding: 20px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
    }

    h2 {
      font-size: 14px;
      margin-top: 0;
      color: #f4f4f5;
      text-transform: uppercase;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 10px;
      margin-bottom: 16px;
    }

    button {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 8px 16px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      margin: 4px;
    }

    button:hover {
      background: var(--accent);
      color: #000;
    }

    button:disabled {
      border-color: #3f3f46;
      color: #52525b;
      cursor: not-allowed;
    }

    .btn-danger {
      color: var(--danger);
      border-color: var(--danger);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }

    .device-list {
      background: #000;
      border-radius: 2px;
      padding: 12px;
      min-height: 40px;
      max-height: 250px;
      overflow-y: auto;
      margin-top: 12px;
      border: 1px solid var(--border);
      font-size: 12px;
    }

    .device-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1f1f22;
    }

    .device-item:last-child {
      border-bottom: none;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 15px 0;
      font-size: 12px;
      color: #f4f4f5;
    }

    input[type="range"] {
      flex-grow: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .log-window {
      height: 160px;
      overflow-y: auto;
      background: #000;
      color: #10b981;
      padding: 12px;
      border-radius: 2px;
      font-size: 11px;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>

<body>
  <div class="terminal-card">
    <h2>[ SYS_LINK ] 网关协议</h2>
    <button id="connectBtn">> INIT_CONNECTION</button>
    <button id="disconnectBtn" disabled>> TERMINATE</button>
  </div>

  <div class="terminal-card">
    <h2>[ RDR_SCAN ] 广域设备雷达</h2>
    <button id="scanBtn" disabled>> EXECUTE_FULL_SCAN</button>
    <div class="device-list" id="deviceList">
      <div style="color:#52525b; text-align:center;">// AWAITING RADAR DEPLOYMENT</div>
    </div>
  </div>

  <div class="terminal-card">
    <h2>[ SYS_CMD ] 显示模式与全局亮度</h2>
    <div class="slider-container">
      <label>🔆 亮度调优:</label>
      <input type="range" id="brightSlider" min="0" max="255" value="30" disabled>
      <span id="brightVal">30</span>
    </div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <button id="syncTimeBtn" disabled>🕒 切至系统时钟</button>
      <button id="showDataBtn" disabled>🚴 切至运动面板</button>
      <button id="clearBtn" class="btn-danger" disabled>📴 强制切断/息屏</button>
    </div>
  </div>

  <div class="terminal-card">
    <h2>[ LOG_OUT ] 交互日志</h2>
    <div class="log-window" id="log"></div>
  </div>

  <script>
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_RX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_TX_UUID = "6e400004-b5a3-f393-e0a9-e50e24dcca9e";

    let device, rxChar, txChar;
    const logEl = document.getElementById('log');
    const deviceListEl = document.getElementById('deviceList');
    const discoveredDevices = new Set();

    function log(msg) {
      logEl.innerHTML += `> ${new Date().toLocaleTimeString('en-US', { hour12: false })} | ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        log("NEGOTIATING HANDSHAKE...");
        device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        rxChar = await service.getCharacteristic(CHAR_RX_UUID);
        txChar = await service.getCharacteristic(CHAR_TX_UUID);

        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', handleRadarPing);

        document.getElementById('connectBtn').disabled = true;
        ['disconnectBtn', 'scanBtn', 'syncTimeBtn', 'showDataBtn', 'clearBtn', 'brightSlider'].forEach(id => document.getElementById(id).disabled = false);
        log("LINK_ESTABLISHED: " + device.name);
      } catch (e) { log("ERR_CONNECT: " + e.message); }
    });

    document.getElementById('disconnectBtn').addEventListener('click', async () => {
      if (device?.gatt.connected) await device.gatt.disconnect();
      document.getElementById('connectBtn').disabled = false;
      ['disconnectBtn', 'scanBtn', 'syncTimeBtn', 'showDataBtn', 'clearBtn', 'brightSlider'].forEach(id => document.getElementById(id).disabled = true);
      log("LINK_TERMINATED");
    });

    document.getElementById('scanBtn').addEventListener('click', async () => {
      discoveredDevices.clear();
      deviceListEl.innerHTML = '<div style="color:var(--accent); text-align:center;">// SCANNING ALL FREQUENCIES...</div>';
      await rxChar.writeValue(new Uint8Array([0x05]));
      log("CMD: FULL_PROXY_SCAN_DISPATCHED");
    });

    // 亮度滑动条事件监听 (使用 change 事件避免拖动中发包堵塞蓝牙)
    const brightSlider = document.getElementById('brightSlider');
    brightSlider.addEventListener('change', async (e) => {
      const val = parseInt(e.target.value);
      document.getElementById('brightVal').innerText = val;
      await rxChar.writeValue(new Uint8Array([0x01, val]));
      log(`CMD: BRIGHTNESS_SET_TO -> ${val}`);
    });
    // 拖动过程中仅仅更新界面数字
    brightSlider.addEventListener('input', (e) => {
      document.getElementById('brightVal').innerText = e.target.value;
    });

    // 模式切换按钮
    document.getElementById('syncTimeBtn').addEventListener('click', async () => {
      const now = new Date();
      const ts = Math.floor((now.getTime() - now.getTimezoneOffset() * 60000) / 1000);
      await rxChar.writeValue(new Uint8Array([0x04, (ts >> 24) & 0xFF, (ts >> 16) & 0xFF, (ts >> 8) & 0xFF, ts & 0xFF]));
      log("CMD: SWAP_UI -> CLOCK_MODE");
    });

    document.getElementById('showDataBtn').addEventListener('click', async () => {
      await rxChar.writeValue(new Uint8Array([0x08])); // 0x08 强制显示运动数据
      log("CMD: SWAP_UI -> SENSOR_DATA_MODE");
    });

    document.getElementById('clearBtn').addEventListener('click', async () => {
      await rxChar.writeValue(new Uint8Array([0x03]));
      log("CMD: SWAP_UI -> SCREEN_OFF");
    });

    function handleRadarPing(e) {
      const v = new Uint8Array(e.target.value.buffer);
      if (v[0] === 0x05) {
        if (deviceListEl.innerText.includes('SCANNING')) deviceListEl.innerHTML = '';
        const type = v[1]; // 0=Other, 1=HRM, 2=CSC
        const addrType = v[2];
        const macLen = v[3];
        const macStr = new TextDecoder().decode(v.slice(4, 4 + macLen));
        const name = new TextDecoder().decode(v.slice(4 + macLen));

        if (discoveredDevices.has(macStr)) return;
        discoveredDevices.add(macStr);

        let typeStr = type === 1 ? 'HRM - 心率监测' : type === 2 ? 'CSC - 速度踏频' : 'UNK - 未知设备';
        let typeColor = type !== 0 ? 'var(--accent)' : '#52525b';

        const item = document.createElement('div');
        item.className = 'device-item';
        item.innerHTML = `
          <div class="device-info">
            <span style="color: #f4f4f5;">${name || 'UNKNOWN_NODE'}</span>
            <span class="device-type" style="color: ${typeColor};">${typeStr} [${macStr}]</span>
          </div>
          <div>
            <button onclick="bindSensor(${addrType}, '${macStr}')">CONNECT</button>
            <button class="btn-danger" onclick="unbindSensor(${addrType}, '${macStr}')">DROP</button>
          </div>
        `;
        deviceListEl.appendChild(item);
      }
    }

    window.bindSensor = async (addrType, macStr) => {
      const payload = new Uint8Array(2 + macStr.length);
      payload[0] = 0x06;
      payload[1] = addrType;
      for (let i = 0; i < macStr.length; i++) payload[2 + i] = macStr.charCodeAt(i);
      await rxChar.writeValue(payload);
      log(`CMD: BINDING_ISSUED -> [${macStr}]`);
    };

    window.unbindSensor = async (addrType, macStr) => {
      const payload = new Uint8Array(2 + macStr.length);
      payload[0] = 0x07;
      payload[1] = addrType;
      for (let i = 0; i < macStr.length; i++) payload[2 + i] = macStr.charCodeAt(i);
      await rxChar.writeValue(payload);
      log(`CMD: DROP_ISSUED -> [${macStr}]`);
    };
  </script>
</body>

</html>
