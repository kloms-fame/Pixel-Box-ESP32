<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Pixel-Box 控制中心</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 420px; margin: 30px auto; padding: 20px; background: #0f111a; color: #e4e4e7; }
    .card { background: #181825; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #2a2a35; }
    h2 { font-size: 16px; margin-top: 0; color: #f4f4f5; font-weight: 600; border-bottom: 1px solid #2a2a35; padding-bottom: 10px; margin-bottom: 15px; }
    button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; margin: 5px 5px 5px 0; transition: background 0.2s; }
    button:hover { background: #2563eb; }
    button:disabled { background: #27272a; color: #52525b; cursor: not-allowed; }
    input { padding: 8px; margin: 5px 5px 5px 0; background: #27272a; border: 1px solid #3f3f46; color: #fff; border-radius: 5px; width: 60px; text-align: center; }
    .log { height: 140px; overflow-y: auto; background: #09090b; color: #10b981; padding: 12px; border-radius: 8px; font-size: 12px; margin-top: 10px; font-family: monospace; border: 1px solid #27272a; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔗 BLE 核心连接</h2>
    <button id="connectBtn">接入 Pixel-Box-Mini</button>
    <button id="disconnectBtn" disabled>切断连接</button>
  </div>

  <div class="card">
    <h2>🕒 桌面时钟模式</h2>
    <button id="syncTimeBtn" disabled>推流本地时间并全屏显示</button>
  </div>

  <div class="card">
    <h2>🔆 亮度与画图</h2>
    <input type="number" id="brightness" value="30" min="0" max="255">
    <button id="setBrightnessBtn" disabled>设定亮度</button>
    <br><br>
    R:<input type="number" id="r" value="255" min="0" max="255">
    G:<input type="number" id="g" value="0" min="0" max="255">
    B:<input type="number" id="b" value="0" min="0" max="255">
    <button id="fillBtn" disabled>RGB 填充</button>
    <button id="clearBtn" disabled>一键清屏</button>
  </div>

  <div class="card">
    <h2>📜 交互日志</h2>
    <div class="log" id="log"></div>
  </div>

  <script>
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_RX_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

    let device = null;
    let rxChar = null;

    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const syncTimeBtn = document.getElementById('syncTimeBtn');
    const setBrightnessBtn = document.getElementById('setBrightnessBtn');
    const fillBtn = document.getElementById('fillBtn');
    const clearBtn = document.getElementById('clearBtn');
    const log = document.getElementById('log');

    function addLog(text) {
      const time = new Date().toLocaleTimeString();
      log.innerHTML += `[${time}] ${text}\n`;
      log.scrollTop = log.scrollHeight;
    }

    connectBtn.addEventListener('click', async () => {
      try {
        addLog("系统扫描中...");
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }]
        });
        const server = await device.gatt.connect();
        addLog("✅ 链路已建立: " + device.name);
        const service = await server.getPrimaryService(SERVICE_UUID);
        rxChar = await service.getCharacteristic(CHAR_RX_UUID);
        
        connectBtn.disabled = true;
        [disconnectBtn, syncTimeBtn, setBrightnessBtn, fillBtn, clearBtn].forEach(btn => btn.disabled = false);
      } catch (error) {
        addLog("❌ 链路失败: " + error.message);
      }
    });

    disconnectBtn.addEventListener('click', async () => {
      if (device && device.gatt.connected) await device.gatt.disconnect();
      connectBtn.disabled = false;
      [disconnectBtn, syncTimeBtn, setBrightnessBtn, fillBtn, clearBtn].forEach(btn => btn.disabled = true);
      addLog("❌ 连接已主动切断");
    });

    // 核心功能：时间同步推流
    syncTimeBtn.addEventListener('click', async () => {
      const now = new Date();
      // 在浏览器端抵消时区误差，传输处理过的伪 UTC 时间戳
      const offset = now.getTimezoneOffset() * 60000;
      const localTimestamp = Math.floor((now.getTime() - offset) / 1000);
      
      const payload = new Uint8Array([
        0x04,
        (localTimestamp >> 24) & 0xFF,
        (localTimestamp >> 16) & 0xFF,
        (localTimestamp >> 8) & 0xFF,
        localTimestamp & 0xFF
      ]);
      
      await rxChar.writeValue(payload);
      addLog(`🕒 时间帧已下发: ${now.toLocaleTimeString()}`);
    });

    setBrightnessBtn.addEventListener('click', async () => {
      const val = parseInt(document.getElementById('brightness').value);
      await rxChar.writeValue(new Uint8Array([0x01, val]));
      addLog(`🔆 亮度调整为: ${val}`);
    });

    fillBtn.addEventListener('click', async () => {
      const r = parseInt(document.getElementById('r').value);
      const g = parseInt(document.getElementById('g').value);
      const b = parseInt(document.getElementById('b').value);
      await rxChar.writeValue(new Uint8Array([0x02, r, g, b]));
      addLog(`🎨 画布重写: R=${r}, G=${g}, B=${b}`);
    });

    clearBtn.addEventListener('click', async () => {
      await rxChar.writeValue(new Uint8Array([0x03]));
      addLog("🗑️ 擦除画布");
    });
  </script>
</body>
</html>
